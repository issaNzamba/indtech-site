name: 🚀 CI/CD - Docker

on:
  push:
    branches:
      - develop
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5   # ← Mise à jour : v5 au lieu de v3

      - name: Déploiement SSH
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "📅 Déploiement Docker du $(date)"
            echo "🌿 Branche : ${{ github.ref_name }}"
            
            cd /var/www/html/portfolio
            
            # Récupérer le code
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            
            # Construire l'image
            docker build -t portfolio-site .
            
            # Arrêter l'ancien container
            docker stop portfolio-site 2>/dev/null || true
            docker rm portfolio-site 2>/dev/null || true
            
            # Lancer le nouveau container
            docker run -d \
              --name portfolio-site \
              --restart unless-stopped \
              -p 80:80 \
              portfolio-site
            
            # Vérifier
            echo "📝 Dernier commit : $(git log -1 --oneline)"
            echo "📦 Containers en cours :"
            docker ps
            
            echo "✅ Déploiement Docker terminé avec succès !"
