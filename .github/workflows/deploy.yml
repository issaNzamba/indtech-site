name: 🚀 Déploiement sur EC2

on:
  push:
    branches:
      - dev          # Déclenché sur push vers dev
      - main         # Déclenché sur push vers main

jobs:
  deploy:
    name: 📦 Déploiement
    runs-on: ubuntu-latest
    
    steps:
      # 1. Récupération du code
      - name: 📥 Récupération du code
        uses: actions/checkout@v3

      # 2. Connexion SSH et déploiement
      - name: 🔗 Connexion SSH et déploiement
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            # Afficher la date et l'heure
            echo "📅 Déploiement du $(date)"
            
            # Aller dans le dossier du site
            cd /var/www/html/votre-site
            
            # Vérifier la branche (selon la branche qui a poussé)
            if [ "${{ github.ref_name }}" == "dev" ]; then
              BRANCH="dev"
            elif [ "${{ github.ref_name }}" == "main" ]; then
              BRANCH="main"
            else
              BRANCH="dev"
            fi
            
            echo "🌿 Branche : $BRANCH"
            
            # Mettre à jour le code
            git fetch origin
            git checkout $BRANCH
            git pull origin $BRANCH
            
            # Afficher le dernier commit
            echo "📝 Dernier commit :"
            git log -1 --oneline
            
            # Redémarrer le serveur web (selon votre configuration)
            # Nginx
            sudo systemctl reload nginx
            # ou Apache
            # sudo systemctl reload apache2
            # ou PHP-FPM
            # sudo systemctl reload php8.1-fpm
            
            # Vider le cache (si vous utilisez un cache)
            # rm -rf /var/www/html/votre-site/cache/*
            
            echo "✅ Déploiement terminé avec succès !"