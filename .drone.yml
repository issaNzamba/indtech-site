---
kind: pipeline
type: docker
name: test-develop

trigger:
  branch:
    - develop

steps:
  - name: build-test
    image: alpine:latest
    commands:
      - echo "✅ Build test sur develop - OK"

---
kind: pipeline
type: docker
name: deploy-production

trigger:
  branch:
    - main

steps:
  - name: deploy
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: EC2_HOST
      username:
        from_secret: EC2_USER
      key:
        from_secret: EC2_SSH_KEY
      port: 22
      script:
        - cd /home/ubuntu/projects/indtech-site
        - git checkout main
        - git pull origin main
        - docker compose down
        - docker rm -f portfolio-site 2>/dev/null || true
        - docker compose up -d --build
        - docker image prune -f