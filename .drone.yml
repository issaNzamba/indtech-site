---
kind: pipeline
type: docker
name: test-develop

trigger:
  branch:
    - develop

steps:
  - name: build-test
    image: docker:latest
    commands:
      - echo "✅ Build test sur develop - OK"
    volumes:
      - name: docker-sock
        path: /var/run/docker.sock

volumes:
  - name: docker-sock
    host:
      path: /var/run/docker.sock

---
kind: pipeline
type: docker
name: deploy-production

trigger:
  branch:
    - main

steps:
  - name: deploy
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: EC2_HOST
      username:
        from_secret: EC2_USER
      key:
        from_secret: EC2_SSH_KEY
      port: 22
      script:
        - sudo systemctl stop nginx 2>/dev/null || true
        - sudo fuser -k 80/tcp 2>/dev/null || true
        - sudo fuser -k 443/tcp 2>/dev/null || true
        - mkdir -p /home/ubuntu/projects/indtech-site
        - if [ ! -d /home/ubuntu/projects/indtech-site/.git ]; then git clone https://github.com/issaNzamba/indtech-site.git /home/ubuntu/projects/indtech-site; fi
        - cd /home/ubuntu/projects/indtech-site
        - git checkout main
        - git pull origin main
        - docker compose down
        - docker compose up -d --build
        - docker image prune -f