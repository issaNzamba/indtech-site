kind: pipeline
type: docker
name: deploy-portfolio

trigger:
  branch:
    - main

steps:
  - name: deploy
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: EC2_HOST
      username:
        from_secret: EC2_USER
      key:
        from_secret: EC2_SSH_KEY
      port: 22
      script:
        - mkdir -p /home/ubuntu/projects/indtech-site
        - if [ ! -d /home/ubuntu/projects/indtech-site/.git ]; then git clone https://github.com/issaNzamba/indtech-site.git /home/ubuntu/projects/indtech-site; fi
        - cd /home/ubuntu/projects/indtech-site
        - git checkout main
        - git pull origin main
        - docker rm -f portfolio-site 2>/dev/null || true
        - docker compose down
        - docker compose up -d --build
        - docker image prune -f