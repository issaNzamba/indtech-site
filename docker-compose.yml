services:
  traefik:
    image: traefik:latest
    container_name: traefik
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - traefik-certificates:/certificates
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=issa.nzamba.pro@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/certificates/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    restart: unless-stopped
    networks:
      - web

  portfolio:
    build: .
    container_name: portfolio-site
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portfolio.rule=Host(`afridevops.online`) || Host(`www.afridevops.online`)"
      - "traefik.http.routers.portfolio.entrypoints=websecure"
      - "traefik.http.routers.portfolio.tls.certresolver=letsencrypt"
    restart: unless-stopped
    networks:
      - web

  drone:
    image: drone/drone:latest
    container_name: drone-server
    volumes:
      - drone-data:/data
    environment:
      - DRONE_GITHUB_CLIENT_ID=Ov23li9kblV2pa34LuiW
      - DRONE_GITHUB_CLIENT_SECRET=01bf70672dc8d4695f29965c6e645c31662b46d8
      - DRONE_RPC_SECRET=212a675af5d7ae0ccf827465e534c44b51a9dc985e25f4653edceeab0de31854
      - DRONE_SERVER_HOST=drone.afridevops.online
      - DRONE_SERVER_PROTO=https
      - DRONE_OPEN=true
      - DRONE_GITHUB_SERVER=https://github.com
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.drone.rule=Host(`drone.afridevops.online`)"
      - "traefik.http.routers.drone.entrypoints=websecure"
      - "traefik.http.routers.drone.tls.certresolver=letsencrypt"
      - "traefik.http.services.drone.loadbalancer.server.port=80"
    restart: unless-stopped
    networks:
      - web

  drone-runner:
    image: drone/drone-runner-docker:latest
    container_name: drone-agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DRONE_RPC_HOST=drone-server:80
      - DRONE_RPC_SECRET=212a675af5d7ae0ccf827465e534c44b51a9dc985e25f4653edceeab0de31854
      - DRONE_RUNNER_CAPACITY=2
    restart: unless-stopped
    networks:
      - web

networks:
  web:
    driver: bridge

volumes:
  traefik-certificates:
  drone-data: